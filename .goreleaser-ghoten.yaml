# Ghoten GoReleaser Configuration
# Configuration for GitHub Releases and Docker images.

project_name: ghoten

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0

    main: ./cmd/tofu

    binary: ghoten

    flags:
      - "-mod=readonly"
      - "-trimpath"

    ldflags:
      - "-s -w"
      - "-X 'github.com/opentofu/opentofu/version.dev=no'"

    goos:
      - linux
      - windows
      - darwin

    goarch:
      - amd64
      - arm64

    ignore:
      - goos: windows
        goarch: arm64

archives:
  # Single archive: tar.gz for Linux/macOS, zip for Windows
  - format: tar.gz
    id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

snapshot:
  name_template: "{{ .Version }}-next"

changelog:
  use: github-native

release:
  # GitHub release settings
  github:
    owner: vmvarela
    name: opentofu
  
  # Release naming
  name_template: "Ghoten v{{ .Version }}"
  
  # Don't mark as draft - publish directly
  draft: false
  
  # Determine prerelease from version (contains -alpha, -beta, -rc)
  prerelease: auto
  
  # Release header
  header: |
    ## Ghoten v{{ .Version }}
    
    This is a custom release of [OpenTofu](https://opentofu.org) with additional features:
    - **ORAS/OCI Backend**: Store state in OCI registries (GHCR, ECR, ACR, Docker Hub)
    - **Smart Refresh**: Improved refresh behavior for large state files
    
    ### Installation
    
    Download the appropriate archive for your platform and extract the `ghoten` binary.
    
    ```bash
    # Linux/macOS
    tar -xzf ghoten_{{ .Version }}_linux_amd64.tar.gz
    sudo mv ghoten /usr/local/bin/
    
    # Verify
    ghoten version
    ```
    
  # Release footer
  footer: |
    
    ---
    
    ### 🐳 Docker Images
    
    ```bash
    # Full image (Alpine-based with git, bash, openssh)
    docker pull ghcr.io/vmvarela/ghoten:{{ .Version }}
    
    # Minimal image (scratch-based, just the binary)
    docker pull ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal
    ```
    
    **Full Changelog**: https://github.com/vmvarela/opentofu/compare/{{ .PreviousTag }}...{{ .Tag }}
    
    Based on OpenTofu. See [upstream releases](https://github.com/opentofu/opentofu/releases) for core changes.

# Docker images
dockers:
  # Full image - amd64
  - use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.vendor=vmvarela"
      - "--label=org.opencontainers.image.description=Ghoten {{ .Version }} - OpenTofu fork with ORAS backend"
      - "--label=org.opencontainers.image.url=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.source=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.licenses=MPL-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-amd64"

  # Full image - arm64
  - use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.vendor=vmvarela"
      - "--label=org.opencontainers.image.description=Ghoten {{ .Version }} - OpenTofu fork with ORAS backend"
      - "--label=org.opencontainers.image.url=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.source=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.licenses=MPL-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-arm64"

  # Minimal image - amd64
  - use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.minimal
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}-minimal"
      - "--label=org.opencontainers.image.vendor=vmvarela"
      - "--label=org.opencontainers.image.description=Ghoten {{ .Version }} minimal - OpenTofu fork with ORAS backend"
      - "--label=org.opencontainers.image.url=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.source=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.licenses=MPL-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-amd64"

  # Minimal image - arm64
  - use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.minimal
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}-minimal"
      - "--label=org.opencontainers.image.vendor=vmvarela"
      - "--label=org.opencontainers.image.description=Ghoten {{ .Version }} minimal - OpenTofu fork with ORAS backend"
      - "--label=org.opencontainers.image.url=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.source=https://github.com/vmvarela/opentofu"
      - "--label=org.opencontainers.image.licenses=MPL-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-arm64"

# Docker manifests for multi-arch support
docker_manifests:
  # Main versioned tag (multi-arch)
  - name_template: "ghcr.io/vmvarela/ghoten:{{ .Version }}"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-amd64"
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-arm64"

  # Minimal versioned tag (multi-arch)
  - name_template: "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-amd64"
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-arm64"

  # Latest tag (multi-arch)
  - name_template: "ghcr.io/vmvarela/ghoten:latest"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-amd64"
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-arm64"

  # Latest minimal tag (multi-arch)
  - name_template: "ghcr.io/vmvarela/ghoten:latest-minimal"
    image_templates:
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-amd64"
      - "ghcr.io/vmvarela/ghoten:{{ .Version }}-minimal-arm64"
